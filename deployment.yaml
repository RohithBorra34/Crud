apiVersion: apps/v1
kind: Deployment
metadata:
  name: crud
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crudLabel
  template:
    metadata:
      labels:
        app: crudLabel
    spec:
      containers:
        - name: product-service
          image: rohith83/crud:latest
          ports:
            - containerPort: 8080